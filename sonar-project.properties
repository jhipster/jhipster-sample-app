sonar.projectKey = jhipsterSampleApplication
sonar.projectName = jhipsterSampleApplication generated by jhipster

# Typescript tests files must be inside sources and tests, otherwise `INFO: Test execution data ignored for 80 unknown
# files, including:` is shown.
sonar.sources = src
sonar.tests = src
sonar.host.url = http://localhost:9001
sonar.sourceEncoding = UTF-8

sonar.test.inclusions = src/test/**/*.*, src/main/webapp/app/**/*.spec.ts
sonar.junit.reportPaths = target/surefire-reports,target/failsafe-reports
sonar.java.codeCoveragePlugin = jacoco
sonar.coverage.jacoco.xmlReportPaths = target/site/**/jacoco*.xml
sonar.exclusions = src/main/webapp/content/**/*.*, src/main/webapp/i18n/*.ts, target/classes/static/**/*.*
sonar.javascript.lcov.reportPaths = target/test-results/lcov.info
sonar.testExecutionReportPaths = target/test-results/TESTS-results-sonar-vitest.xml

sonar.issue.ignore.multicriteria = \
  S7027-domain, S3437, S7027-dto, UndocumentedApi, S125, S4502, S4684, S5145, S6437, S6437-2, S6418, S2187, S1192
# Rule https://rules.sonarsource.com/java/RSPEC-7027 is ignored for entities
sonar.issue.ignore.multicriteria.S7027-domain.resourceKey = src/main/java/io/github/jhipster/sample/domain/**/*
sonar.issue.ignore.multicriteria.S7027-domain.ruleKey = javaarchitecture:S7027
# Rule https://rules.sonarsource.com/java/RSPEC-3437 is ignored
sonar.issue.ignore.multicriteria.S3437.resourceKey = src/main/java/io/github/jhipster/sample/**/*
sonar.issue.ignore.multicriteria.S3437.ruleKey = squid:S3437
# Rule https://rules.sonarsource.com/java/RSPEC-7027 is ignored for dtos
sonar.issue.ignore.multicriteria.S7027-dto.resourceKey = src/main/java/io/github/jhipster/sample/service/dto/**/*
sonar.issue.ignore.multicriteria.S7027-dto.ruleKey = javaarchitecture:S7027
# Rule https://rules.sonarsource.com/java/RSPEC-1176 is ignored, as we want to follow "clean code" guidelines and
# classes, methods and arguments names should be self-explanatory
sonar.issue.ignore.multicriteria.UndocumentedApi.resourceKey = src/main/java/io/github/jhipster/sample/**/*
sonar.issue.ignore.multicriteria.UndocumentedApi.ruleKey = squid:UndocumentedApi
# Rule https://rules.sonarsource.com/xml/RSPEC-125 is ignored, we provide commented examples
sonar.issue.ignore.multicriteria.S125.resourceKey = src/main/resources/logback-spring.xml
sonar.issue.ignore.multicriteria.S125.ruleKey = xml:S125
# Rule https://rules.sonarsource.com/java/RSPEC-4502 is ignored, as for JWT tokens we are not subject to CSRF attack
sonar.issue.ignore.multicriteria.S4502.resourceKey = src/main/java/io/github/jhipster/sample/config/SecurityConfiguration.java
sonar.issue.ignore.multicriteria.S4502.ruleKey = java:S4502
# Rule https://rules.sonarsource.com/java/RSPEC-4684
sonar.issue.ignore.multicriteria.S4684.resourceKey = src/main/java/io/github/jhipster/sample/web/rest/**/*
sonar.issue.ignore.multicriteria.S4684.ruleKey = java:S4684
# Rule https://rules.sonarsource.com/java/RSPEC-5145 is ignored, as we use log filter to format log messages
sonar.issue.ignore.multicriteria.S5145.resourceKey = src/main/java/io/github/jhipster/sample/**/*
sonar.issue.ignore.multicriteria.S5145.ruleKey = javasecurity:S5145
# Rule https://rules.sonarsource.com/java/RSPEC-6437 is ignored, hardcoded passwords are provided for development
# purposes
sonar.issue.ignore.multicriteria.S6437.resourceKey = src/main/resources/config/application-secret-samples.yml
sonar.issue.ignore.multicriteria.S6437.ruleKey = java:S6437
# Rule https://rules.sonarsource.com/java/RSPEC-6437 is ignored, hardcoded passwords are provided for development
# purposes
sonar.issue.ignore.multicriteria.S6437-2.resourceKey = src/main/resources/config/application-tls.yml
sonar.issue.ignore.multicriteria.S6437-2.ruleKey = java:S6437
# Rule yaml:S6418 is ignored, hardcoded passwords are provided for development and testing purposes
sonar.issue.ignore.multicriteria.S6418.resourceKey = src/main/resources/config/application-secret-samples.yml
sonar.issue.ignore.multicriteria.S6418.ruleKey = yaml:S6418
# Rule https://rules.sonarsource.com/java/RSPEC-2187 is ignored, gatling tests are not supported by sonar
sonar.issue.ignore.multicriteria.S2187.resourceKey = src/test/java/gatling/**/*
sonar.issue.ignore.multicriteria.S2187.ruleKey = java:S2187
# Rule https://rules.sonarsource.com/java/RSPEC-1192, there is no easy way to avoid this issue
sonar.issue.ignore.multicriteria.S1192.resourceKey = src/main/java/io/github/jhipster/sample/config/CacheConfiguration.java
sonar.issue.ignore.multicriteria.S1192.ruleKey = java:S1192
